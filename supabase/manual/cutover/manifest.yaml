# supabase/manual/cutover/manifest.yaml
#
# Layer 2 cutover manifest — single source of truth for preservation / wipe / untouched
# sets and TRUNCATE dependency order.
#
# Ground truth:
#   audit/phase_5_section_3_cutover_policy.md
#   audit/phase_5_section_3_amendment_1.md
#   audit/phase_5_section_3_amendment_2.md
# Schema baseline:
#   - supabase/migrations/20260421000000_reverse_engineered_baseline.sql (129 public tables)
#
# Authored: Phase A (2026-04-23). Do not execute cutover against this manifest
# without Phase C runbook review and operator confirmation gate per §3.4.
#
# Scope: public schema of the Supabase project `omnix-core` (mnbloeoiiwenlywnnoxe).
# Supabase-managed schemas (storage.*, realtime.*, vault.*, supabase_migrations.*,
# extensions.*, graphql.*, cron.*) are implicitly untouched per §3.3 bullet 3;
# auth.* is explicitly preserved-by-not-touching per §3.1.8 (entry below).

schema_version: 1

