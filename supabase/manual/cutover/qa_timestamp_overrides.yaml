# Layer 2 QA corpus freeze timestamp overrides.
#
# Context: MS Vallee is the only live Layer 2 site, and it is still an
# owner-operated test site. For wipe-set tables whose timestamp semantics are
# missing or ambiguous under the strict script resolver, include all rows in the
# local gitignored QA archive rather than risk omitting useful test corpus rows.
#
# Format consumed by scripts/cutover_qa_corpus_freeze.py:
#   table name -> timestamp column, or null for "include all rows".

tables:
  # Ambiguous under the strict resolver; include all test rows.
  public.patrol_violations: null
  public.incidents: null
  public.client_conversation_messages: null
  public.client_conversation_push_queue: null
  public.guard_sync_operations: null
  public.onyx_alert_outcomes: null

